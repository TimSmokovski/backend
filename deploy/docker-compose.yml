version: "3.9"

services:
  backend:
    build: .
    container_name: lkstars-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/backend/data
    expose:
      - "8000"
    # If you do NOT use nginx and want to expose backend directly:
    # ports:
    #   - "8000:8000"

  nginx:
    image: nginx:alpine
    container_name: lkstars-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      # - "443:443"   # uncomment after you add SSL certs
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      # - ./certs:/etc/nginx/certs:ro
