<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CaseArena</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Loader -->
    <div id="loader" class="loader">
      <div class="loader-logo">🎰</div>
      <div class="loader-text">CaseArena</div>
      <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    </div>

    <!-- Main App -->
    <div id="main" class="hidden">
      <!-- Top bar -->
      <div class="topbar">
        <div class="topbar-balance">
          <svg class="star-icon" viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 6px #ffd700cc);flex-shrink:0">
            <defs>
              <radialGradient id="tbs" cx="38%" cy="28%">
                <stop offset="0%" stop-color="#fffde7"/>
                <stop offset="45%" stop-color="#ffd700"/>
                <stop offset="100%" stop-color="#f59e0b88"/>
              </radialGradient>
            </defs>
            <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="url(#tbs)" stroke="#f59e0b" stroke-width="0.5"/>
            <polygon points="12,4.5 14,8.8 18.7,9.5 15.3,12.8 16.1,17.5 12,15.3 7.9,17.5 8.7,12.8 5.3,9.5 10,8.8" fill="rgba(255,255,255,0.22)"/>
          </svg>
          <span id="user-balance">0</span>
        </div>
        <div class="topbar-user">
          <span id="user-name">Загрузка...</span>
          <div class="topbar-avatar" id="user-avatar">?</div>
        </div>
      </div>

      <!-- Pages -->
      <div id="page-cases" class="page active"></div>
      <div id="page-contests" class="page hidden"></div>
      <div id="page-tasks" class="page hidden"></div>
      <div id="page-leaders" class="page hidden"></div>
      <div id="page-profile" class="page hidden"></div>

      <!-- Bottom nav -->
      <nav class="bottom-nav">
        <button class="nav-btn active" data-page="cases">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          <span>Кейсы</span>
        </button>
        <button class="nav-btn" data-page="contests">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span>Конкурсы</span>
          <div class="nav-badge" id="contests-badge">4</div>
        </button>
        <button class="nav-btn" data-page="tasks">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <span>Задания</span>
          <div class="nav-badge" id="tasks-badge">9</div>
        </button>
        <button class="nav-btn" data-page="leaders">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
          <span>Лидеры</span>
        </button>
        <button class="nav-btn" data-page="profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span>Профиль</span>
        </button>
      </nav>
    </div>
  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal-content"></div>
  </div>

  <script src="js/api.js?v=2"></script>
  <script src="js/pages/cases.js?v=2"></script>
  <script src="js/pages/contests.js?v=2"></script>
  <script src="js/pages/tasks.js?v=2"></script>
  <script src="js/pages/leaders.js?v=2"></script>
  <script src="js/pages/profile.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
  <script>
    // Fallback: если JS упал — всё равно показать приложение через 3 сек
    setTimeout(function() {
      var loader = document.getElementById('loader');
      var main = document.getElementById('main');
      if (loader && !loader.classList.contains('hidden')) {
        loader.classList.add('hidden');
        if (main) main.classList.remove('hidden');
      }
    }, 3000);
  </script>
</body>
</html>
